<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Compact Calendar 2025–2027 (Google Sheet CSV)</title>
<style>
  /* ---------- Design tokens ---------- */
  :root {
    --bg:#f7f7f7; --surface:#fff; --shadow:rgba(0,0,0,0.08);
    --text:#111; --muted:#666;

    /* Header / logo */
    --logo-height: 60px;

    /* Size (compact) */
    --base-font: 20px;
    --day-font: 1.3em;
    --date-font: 1.1em;

    /* Month card */
    --month-radius: 15px;
    --month-pad: 4px;              /* inner padding of the month content area */
    --grid-gap: 15px;
    --date-pad-v: 4px;
    --date-min-h: 26px;

    /* Month box background (global) — change this to style all month boxes */
    --month-bg: #E5E5E5;

    /* Month label (left ribbon) */
    --label-width: 45px;
    --label-bg: #7C7D7C;              /* label background color */
    --label-text: #fff;            /* label text color */

.date {
  font-weight: bold; /* Makes all date numbers bold */
}

    /* Badge / Tooltip */
    --badge-font: 8px;
    --tooltip-max: 300px;

    /* Monday background */
    --monday-bg:#C7C9C7;
    --monday-bg-hover:#C7C9C7;
  }

  /* ---------- Base layout ---------- */
  html, body { height:100%; }
  body {
    font-family: Arial bold, sans-serif;
    font-size: var(--base-font);
    background: var(--bg);
    margin:0;
    padding:25px;
    color: var(--text);
  }

  .header {
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    margin-bottom:10px;
  }
  .header-left, .header-right { display:flex; gap:0px; align-items:center; flex-wrap:wrap; }
  .logo {
    height: var(--logo-height);
    width: auto;
    display:block;
  }
  h1 { margin:0; font-size: 2.2em; }
  select {
    padding:6px 12px;
    font-size: 0.95em;
    border-radius:10px;
    border:1px solid #ccc;
    background:#fff;
    box-shadow:0 1px 3px var(--shadow);
  }

  #status {
    text-align:center;
    color:#b00;
    min-height:18px;
    margin-bottom:6px;
    font-size:0.92em;
  }

  .calendar-wrapper { display:none; }
  .calendar-wrapper.active {
    display:grid;
    grid-template-columns:repeat(4,1fr); /* dense on wide screens */
    gap:var(--grid-gap);
  }
  @media(max-width:1600px){
    .calendar-wrapper.active{grid-template-columns:repeat(3,1fr);}
  }
  @media(max-width:1000px){
    .calendar-wrapper.active{grid-template-columns:repeat(2,1fr);}
  }
  @media(max-width:600px){
    .calendar-wrapper.active{grid-template-columns:1fr;}
  }

  /* ---------- Month card with left label ---------- */
  .month {
    position:relative;
    background: var(--month-bg);
    border-radius: var(--month-radius);
    box-shadow:0 1px 4px var(--shadow);

    /* Make room for the left label */
    padding: var(--month-pad);
    padding-left: calc(var(--label-width) + var(--month-pad));
  }
  /* The left ribbon label */
  .month-label {
    position:absolute;
    left:0;
    top:0;
    bottom:0;
    width: var(--label-width);
    background: var(--label-bg);
    color: var(--label-text);
    border-radius: var(--month-radius) 0 0 var(--month-radius);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:1000;
    font-size: 30px;
    letter-spacing:2px;
    

    /* Vertical text (reads top-to-bottom on the ribbon) */
    writing-mode: vertical-rl;
    text-orientation: mixed;
    /* Slight inner padding */
    padding: 8px 0;
  }

  /* ---------- Grid headers & dates ---------- */
  .days, .dates {
    display:grid;
    grid-template-columns:repeat(7,1fr);
    text-align:center;
  }
  .days div {
    font-weight:bold;
    padding:3px;
    color:var(--muted);
    font-size: var(--day-font);
  }
  /* Monday off-day label (red); Sat/Sun normal */
  .days .off { color:#d33; }

  .date {
    position:relative;
    padding:var(--date-pad-v) 0;
    margin:2px;
    border-radius:8px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    z-index:2;
    color:var(--text);
    min-height:var(--date-min-h);
    user-select:none;
    background: transparent;
    outline: none;
    border: none;
    font-size: var(--date-font);
  }
  .date:hover { background: rgba(0,0,0,0.06); }
  .date:focus, .date:focus-visible { outline: none; }

  /* Mondays light grey when no events */
  .date.is-monday { background: var(--monday-bg); }
  .date.is-monday:hover { background: var(--monday-bg-hover); }

  /* -------- Badge (event count) — transparent, bottom-right -------- */
  .badge {
    position:absolute;
    font-size:var(--badge-font);
    line-height:1;
    min-width: 12px;
    text-align: right;
    background: transparent;
    box-shadow: none;
    color: inherit;
    font-weight: 700;
    text-shadow: 0 1px 1px rgba(0,0,0,0.25);
    z-index:3;
    bottom:3px; right:4px;
    pointer-events:none;
  }

  /* -------- Hover tooltip (auto pop-up on desktop) -------- */
  .date:not([data-events=""]):hover::after {
    content: attr(data-events);
    position:absolute;
    background:rgba(0,0,0,0.92);
    color:#fff;
    padding:10px 12px;
    border-radius:10px;
    bottom:115%;
    left:50%;
    transform:translateX(-50%);
    white-space:pre-line;
    z-index:10;
    font-size:0.95rem;
    line-height:1.45em;
    width:max-content;
    max-width:var(--tooltip-max);
    text-align:left;
    box-shadow:0 6px 18px rgba(0,0,0,0.30);
    pointer-events:none;
  }
  .date:not([data-events=""]):hover::before {
    content:"";
    position:absolute;
    bottom:110%;
    left:50%;
    transform:translateX(-50%);
    border:6px solid transparent;
    border-top-color:rgba(0,0,0,0.92);
    z-index:11;
    pointer-events:none;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <!-- Replace src with your logo file or URL -->
    <img class="logo" src="https://drive.google.com/thumbnail?id=1LxB4prb5ifCjptw89yB6ofwsjhVnBvTg"027</h1>
  </div>

  <div class="header-right">
    <label for="yearSelector" class="sr-only" aria-hidden="true">Year</label>
    <select id="yearSelector" aria-label="Select calendar year">
      <option value="2025" selected>2025</option>
      <option value="2026">2026</option>
      <option value="2027">2027</option>
    </select>
  </div>
</div>

<div id="status" role="status" aria-live="polite"></div>
<div id="calendarContainer"></div>

<script>
  // --- Config ---
  const colors = ["#ff6347","#4169e1","#228b22","#ffa500"]; // per-sheet color
  const sheetUrls = [
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vRzQsWfxNK7xUMyYhG_0ShdEw640h-NAxbYxeM_XXcCGi9qGwXD6wd-cIsWjeCgj3ZD7blNzl8iD6uJ/pub?output=csv",
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQ80d-yFty7YxnFPZ3up_IiX7d0o-0p7Hs2oiYF7Z3WTWr-ft9CaSikJA317lqY5L3FISGdVQsxWbC/pub?output=csv",
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vSuHRhZeGSReujoolkCzGlX52aJ2fSoCBhgJHG1Oxr992GUE8RfcLBsHh1neI5p-bH4YvcxxiV0f25k/pub?output=csv",
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vQIdLY_i3GIjnDORjRyTXoRbQeLVMzfATkYFnWXuN1OujlKb7HIBLI1dwVUiEXGt_sUpXY4XEs6OFpJ/pub?output=csv"
  ];
  const years=[2025,2026,2027];
  const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const dayNames=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const container=document.getElementById("calendarContainer");
  const statusEl = document.getElementById("status");

  // Optional: custom month backgrounds (override global --month-bg)
  // Uncomment and edit to set per-month colors (Jan..Dec)
  // const monthBgByIndex = [
  //   "#fff", "#fff", "#fff", "#fef6e4", "#f4faff", "#f5fff0",
  //   "#fff5f7", "#f7f7ff", "#f5f5f5", "#f6fbff", "#fffaf0", "#f4f4f4"
  // ];

  function hasGoodContrast(bgHex){
    if(!bgHex || !/^#([0-9a-f]{6})$/i.test(bgHex)) return false;
    const r=parseInt(bgHex.slice(1,3),16)/255;
    const g=parseInt(bgHex.slice(3,5),16)/255;
    const b=parseInt(bgHex.slice(5,7),16)/255;
    const sr = r <= 0.03928 ? r/12.92 : Math.pow((r+0.055)/1.055, 2.4);
    const sg = g <= 0.03928 ? g/12.92 : Math.pow((g+0.055)/1.055, 2.4);
    const sb = b <= 0.03928 ? b/12.92 : Math.pow((b+0.055)/1.055, 2.4);
    const L = 0.2126*sr + 0.7152*sg + 0.0722*sb;
    const contrastWhite = (1.05)/(L+0.05);
    return contrastWhite >= 4.5; // WCAG AA
  }

  // CSV parsing (robust)
  function detectDelimiter(headerLine){
    const commas=(headerLine.match(/,/g)||[]).length;
    const semis=(headerLine.match(/;/g)||[]).length;
    return semis>commas ? ';' : ',';
  }
  function smartSplit(line, delim){
    const out=[]; let cur=""; let inQuotes=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(inQuotes){
        if(ch==='"' && line[i+1]==='"'){ cur+='"'; i++; }
        else if(ch==='"'){ inQuotes=false; }
        else { cur+=ch; }
      }else{
        if(ch==='"'){ inQuotes=true; }
        else if(ch===delim){ out.push(cur.trim()); cur=""; }
        else { cur+=ch; }
      }
    }
    out.push(cur.trim());
    return out;
  }
  function parseCSV(text){
    const lines=text.trim().split(/\r?\n/).filter(Boolean);
    if(lines.length<2) return [];
    const delim = detectDelimiter(lines[0]);
    const header = smartSplit(lines[0], delim).map(h => h.toLowerCase());
    const dateIdx = header.findIndex(h => /date/.test(h));
    const eventIdx = header.findIndex(h => /event|title|name/.test(h));
    const di = dateIdx >= 0 ? dateIdx : 0;
    const ei = eventIdx >= 0 ? eventIdx : 1;
    const out=[];
    for(let i=1;i<lines.length;i++){
      const cols = smartSplit(lines[i], delim);
      const rawDate = (cols[di]||"").trim();
      const event = (cols[ei]||"").trim();
      let iso = rawDate;
      if(/^\d{4}-\d{2}-\d{2}$/.test(rawDate)){
        iso = rawDate;
      }else{
        const dmy = rawDate.match(/^(\d{1,2})\/\-\/\-$/);
        if(dmy){
          const d = dmy[1].padStart(2,'0');
          const m = dmy[2].padStart(2,'0');
          const y = dmy[3];
          iso = `${y}-${m}-${d}`;
        }
      }
      if(iso && event) out.push({date:iso, event});
    }
    return out;
  }

  function createCalendar(year){
    const wrapper=document.createElement("div");
    wrapper.className="calendar-wrapper";
    wrapper.id=`year-${year}`;

    for(let m=0;m<12;m++){
      const monthDiv=document.createElement("div");
      monthDiv.className="month";

      // Apply per-month background if provided
      // if (Array.isArray(monthBgByIndex)) {
      //   monthDiv.style.background = monthBgByIndex[m];
      // }

      // Left ribbon label
      const label=document.createElement("div");
      label.className="month-label";
      label.textContent=monthNames[m];
      monthDiv.appendChild(label);

      // Weekday headers
      const days=document.createElement("div");
      days.className="days";
      dayNames.forEach((d,i)=>{
        const div=document.createElement("div");
        div.textContent=d;
        if(i===0) div.classList.add("off"); // Monday red
        days.appendChild(div);
      });
      monthDiv.appendChild(days);

      // Dates grid
      const dates=document.createElement("div");
      dates.className="dates";
      const first=new Date(year,m,1);
      const start=(first.getDay()+6)%7; // Monday-first
      const total=new Date(year,m+1,0).getDate();
      for(let i=0;i<start;i++) dates.appendChild(document.createElement("div"));
      for(let d=1;d<=total;d++){
        const btn=document.createElement("button");
        btn.type="button";
        btn.className="date";
        btn.textContent=d;
        const iso=`${year}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        btn.dataset.date=iso;
        btn.setAttribute("aria-label", `${monthNames[m]} ${d}, ${year}`);

        // Mark Mondays for grey (no events)
        const dayIndex = (start + (d - 1)) % 7; // 0 = Monday
        if(dayIndex === 0) btn.classList.add("is-monday");

        const badge=document.createElement("span");
        badge.className="badge"; badge.hidden=true;
        btn.appendChild(badge);
        dates.appendChild(btn);
      }
      monthDiv.appendChild(dates);
      wrapper.appendChild(monthDiv);
    }
    container.appendChild(wrapper);
  }

  function preloadCalendars(){
    years.forEach(createCalendar);
    document.getElementById("year-2025").classList.add("active");
  }

  async function loadSheets(urls){
    statusEl.textContent = "Loading sheets...";
    const all=[];
    for(let i=0;i<urls.length;i++){
      try{
        const res=await fetch(urls[i], { cache:"no-store" });
        if(!res.ok) throw new Error(`${res.status} ${res.statusText}`);
        const txt=await res.text();
        const data=parseCSV(txt);
        all.push({data,color:colors[i]});
      }catch(e){
        console.warn("Error loading",urls[i],e);
      }
    }
    statusEl.textContent = all.length ? "" : "No sheets loaded. Please check CSV publish links.";
    applyEvents(all);
  }

  function applyEvents(all){
    const map={};
    all.forEach(src=>{
      src.data.forEach(e=>{
        if(!map[e.date]) map[e.date]=[];
        if(!map[e.date].some(x => x.text===e.event && x.color===src.color)){
          map[e.date].push({text:e.event,color:src.color});
        }
      });
    });

    document.querySelectorAll(".date").forEach(div=>{
      const evs=map[div.dataset.date];
      const badge=div.querySelector(".badge");

      if(evs && evs.length){
        // Accessible label
        const eventsText = evs.map(e => e.text).join(", ");
        div.setAttribute("aria-label", `${div.getAttribute("aria-label")} – ${evs.length} event(s): ${eventsText}`);

        // Event backgrounds override Monday grey
        if(evs.length===1){
          const bg = evs[0].color;
          div.style.background=bg;
          div.style.color = hasGoodContrast(bg) ? "#fff" : "#000";
        }else{
          const n = evs.length;
          const stops = evs.map((e,i)=>{
            const start = Math.round(i*(100/n));
            const end   = Math.round((i+1)*(100/n));
            return `${e.color} ${start}% ${end}%`;
          });
          div.style.background=`linear-gradient(135deg,${stops.join(",")})`;
          div.style.color="#fff";
        }

        // Badge (transparent) — bottom-right
        badge.textContent=evs.length;
        badge.hidden=false;

        // Tooltip content (newline-separated)
        div.dataset.events = evs.map(e => e.text).join("\n");
      }else{
        // No events: keep Monday grey if Monday, else transparent
        if(div.classList.contains("is-monday")){
          // relies on CSS background; leave inline style empty to use class background
          div.style.background = ""; // ensure class takes effect
        }else{
          div.style.background="transparent";
        }
        div.style.color="var(--text)";
        badge.hidden=true;
        div.dataset.events = "";
      }
    });
  }

  // UI: year change
  document.getElementById("yearSelector").addEventListener("change",e=>{
    document.querySelectorAll(".calendar-wrapper").forEach(w=>w.classList.remove("active"));
    document.getElementById(`year-${e.target.value}`).classList.add("active");
    statusEl.textContent = "";
  });

  // Init
  preloadCalendars();
  loadSheets(sheetUrls);
</script>

</body>
</html>
